name: CD - Staging

on:
  push:
    branches: [ "dev" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t app:${{ github.sha }} .
          docker save app:${{ github.sha }} -o app-image.tar

      - name: Copy image to staging droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STG_SSH_HOST }}
          username: ${{ secrets.STG_SSH_USER }}
          key: ${{ secrets.STG_SSH_KEY }}
          source: "app-image.tar"
          target: "~/"

      - name: Deploy on staging via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STG_SSH_HOST }}
          username: ${{ secrets.STG_SSH_USER }}
          key: ${{ secrets.STG_SSH_KEY }}
          script: |
            set -e
            docker load -i ~/app-image.tar
            rm -f ~/app-image.tar
            docker rm -f app-stg || true
            docker run -d --name app-stg --restart unless-stopped --env-file $HOME/.env.staging -p 3000:3000 app:${{ github.sha }}
