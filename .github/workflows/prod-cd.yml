name: CD - Production

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t app:${{ github.sha }} .
          docker save app:${{ github.sha }} -o app-image.tar
          chmod 644 app-image.tar

      - name: Copy image to production droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "app-image.tar"
          target: "~/"

      - name: Copy compose file to production droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "docker-compose.frontend.yml"
          target: "~/"

      - name: Deploy on production via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            mkdir -p ~/apps/luisardito-frontend
            mv -f ~/docker-compose.frontend.yml ~/apps/luisardito-frontend/docker-compose.frontend.yml || true
            docker load -i ~/app-image.tar
            rm -f ~/app-image.tar
            # Tag the loaded image to a stable name used by Compose
            docker tag app:${{ github.sha }} app:frontend
            # Stop old single-container deployment if exists
            docker rm -f app-prod || true
            # Create frontend production env file
            rm -f ~/.env.frontend.production
            echo "NODE_ENV=production" >> ~/.env.frontend.production
            echo "PORT=3000" >> ~/.env.frontend.production
            echo "NEXT_PUBLIC_API_URL=${{ secrets.FRONTEND_API_URL_PROD }}" >> ~/.env.frontend.production
            chmod 600 ~/.env.frontend.production
            # Compose using production compose file (env file is fixed to .env.frontend.production)
            docker compose -f ~/apps/luisardito-frontend/docker-compose.frontend.yml down --remove-orphans || true
            docker compose -f ~/apps/luisardito-frontend/docker-compose.frontend.yml up -d
