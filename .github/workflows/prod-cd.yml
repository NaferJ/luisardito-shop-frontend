name: CD - Production

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.FRONTEND_API_URL_PROD }} \
            --build-arg NEXT_PUBLIC_API_TIMEOUT=${{ secrets.FRONTEND_API_TIMEOUT_PROD }} \
            --build-arg NEXT_PUBLIC_APP_NAME=${{ secrets.FRONTEND_APP_NAME_PROD }} \
            --build-arg NEXT_PUBLIC_APP_VERSION=${{ secrets.FRONTEND_APP_VERSION_PROD }} \
            --build-arg NEXT_PUBLIC_ENABLE_DEBUG=${{ secrets.FRONTEND_ENABLE_DEBUG_PROD }} \
            --build-arg NEXT_PUBLIC_KICK_CLIENT_ID=${{ secrets.KICK_CLIENT_ID_PROD }} \
            --build-arg NEXT_PUBLIC_KICK_CLIENT_SECRET=${{ secrets.KICK_CLIENT_SECRET_PROD }} \
            --build-arg NEXT_PUBLIC_REDIRECT_URI=${{ secrets.KICK_REDIRECT_URI_PROD }} \
            --build-arg NEXT_PUBLIC_KICK_OAUTH_URL=${{ secrets.KICK_OAUTH_URL_PROD }} \
            --build-arg NEXT_PUBLIC_KICK_TOKEN_URL=${{ secrets.KICK_TOKEN_URL_PROD }} \
            --build-arg NEXT_PUBLIC_KICK_USER_URL=${{ secrets.KICK_USER_URL_PROD }} \
            --build-arg NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME_PROD }} \
            --build-arg NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET=${{ secrets.CLOUDINARY_UPLOAD_PRESET_PROD }} \
            --build-arg NEXT_PUBLIC_KICK_SCOPE=${{ secrets.KICK_SCOPE_PROD }} \
            -t app:${{ github.sha }} .
          docker save app:${{ github.sha }} -o app-image.tar
          chmod 644 app-image.tar

      - name: Copy image to production droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "app-image.tar"
          target: "~/"

      - name: Copy compose file to production droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "docker-compose.frontend.yml"
          target: "~/"

      - name: Deploy on production via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            mkdir -p ~/apps/luisardito-shop-frontend
            mv -f ~/docker-compose.frontend.yml ~/apps/luisardito-shop-frontend/docker-compose.frontend.yml || true
            docker load -i ~/app-image.tar
            rm -f ~/app-image.tar
            # Tag the loaded image to a stable name used by Compose
            docker tag app:${{ github.sha }} app:frontend
            # Stop old single-container deployment if exists
            docker rm -f app-prod || true
            # Create frontend production env file
            rm -f ~/.env.frontend.production
            echo "NODE_ENV=${{ secrets.FRONTEND_NODE_ENV_PROD }}" >> ~/.env.frontend.production
            echo "PORT=${{ secrets.FRONTEND_PORT_PROD }}" >> ~/.env.frontend.production
            echo "NEXT_PUBLIC_API_URL=${{ secrets.FRONTEND_API_URL_PROD }}" >> ~/.env.frontend.production
            echo "NEXT_PUBLIC_API_TIMEOUT=${{ secrets.FRONTEND_API_TIMEOUT_PROD }}" >> ~/.env.frontend.production
            echo "NEXT_PUBLIC_APP_NAME=${{ secrets.FRONTEND_APP_NAME_PROD }}" >> ~/.env.frontend.production
            echo "NEXT_PUBLIC_APP_VERSION=${{ secrets.FRONTEND_APP_VERSION_PROD }}" >> ~/.env.frontend.production
            echo "NEXT_PUBLIC_ENABLE_DEBUG=${{ secrets.FRONTEND_ENABLE_DEBUG_PROD }}" >> ~/.env.frontend.production
            echo "NEXT_PUBLIC_KICK_CLIENT_ID=${{ secrets.KICK_CLIENT_ID_PROD }}" >> ~/.env.frontend.production
            echo "NEXT_PUBLIC_KICK_CLIENT_SECRET=${{ secrets.KICK_CLIENT_SECRET_PROD }}" >> ~/.env.frontend.production
            echo "NEXT_PUBLIC_REDIRECT_URI=${{ secrets.KICK_REDIRECT_URI_PROD }}" >> ~/.env.frontend.production
            echo "NEXT_PUBLIC_KICK_OAUTH_URL=${{ secrets.KICK_OAUTH_URL_PROD }}" >> ~/.env.frontend.production
            echo "NEXT_PUBLIC_KICK_TOKEN_URL=${{ secrets.KICK_TOKEN_URL_PROD }}" >> ~/.env.frontend.production
            echo "NEXT_PUBLIC_KICK_USER_URL=${{ secrets.KICK_USER_URL_PROD }}" >> ~/.env.frontend.production
            echo "NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME_PROD }}" >> ~/.env.frontend.production
            echo "NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET=${{ secrets.CLOUDINARY_UPLOAD_PRESET_PROD }}" >> ~/.env.frontend.production
            echo "NEXT_PUBLIC_KICK_SCOPE=${{ secrets.KICK_SCOPE_PROD }}" >> ~/.env.frontend.production
            chmod 600 ~/.env.frontend.production
            # Compose using production compose file (env file is fixed to .env.frontend.production)
            docker compose -f ~/apps/luisardito-shop-frontend/docker-compose.frontend.yml down --remove-orphans || true
            docker compose -f ~/apps/luisardito-shop-frontend/docker-compose.frontend.yml up -d
