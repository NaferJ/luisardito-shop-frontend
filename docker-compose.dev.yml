services:
  app:
    image: node:20-bookworm-slim
    working_dir: /app
    ports:
      - '3002:3002'
    volumes:
      # Mount source code but exclude node_modules to avoid conflicts
      - ./:/app
      - /app/node_modules
      - /app/.next
    command: ['sh', '-c', 'if [ ! -d node_modules ]; then npm install; fi && npm run dev']
    environment:
      - NEXT_TELEMETRY_DISABLED=1
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    env_file:
      - .env.development
    stdin_open: true
    tty: true
    # Restart only if container fails
    restart: unless-stopped
