name: CD - Staging

on:
  push:
    branches: [ "dev" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build --build-arg NEXT_PUBLIC_API_URL=${{ secrets.FRONTEND_API_URL_STG }} -t app:${{ github.sha }} .
          docker save app:${{ github.sha }} -o app-image.tar
          chmod 644 app-image.tar

      - name: Copy image to staging droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STG_SSH_HOST }}
          username: ${{ secrets.STG_SSH_USER }}
          key: ${{ secrets.STG_SSH_KEY }}
          source: "app-image.tar"
          target: "~/"

      - name: Copy compose file to staging droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STG_SSH_HOST }}
          username: ${{ secrets.STG_SSH_USER }}
          key: ${{ secrets.STG_SSH_KEY }}
          source: "docker-compose.frontend.staging.yml"
          target: "~/"

      - name: Deploy on staging via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STG_SSH_HOST }}
          username: ${{ secrets.STG_SSH_USER }}
          key: ${{ secrets.STG_SSH_KEY }}
          script: |
            set -e
            mkdir -p ~/apps/luisardito-shop-frontend
            mv -f ~/docker-compose.frontend.staging.yml ~/apps/luisardito-shop-frontend/docker-compose.frontend.staging.yml || true
            docker load -i ~/app-image.tar
            rm -f ~/app-image.tar
            # Tag the loaded image to a stable name used by Compose
            docker tag app:${{ github.sha }} app:frontend
            # Stop old single-container deployment if exists
            docker rm -f app-stg || true
            # Create frontend staging env file
            rm -f ~/.env.frontend.staging
            echo "NODE_ENV=production" >> ~/.env.frontend.staging
            echo "PORT=3000" >> ~/.env.frontend.staging
            echo "NEXT_PUBLIC_API_URL=${{ secrets.FRONTEND_API_URL_STG }}" >> ~/.env.frontend.staging
            chmod 600 ~/.env.frontend.staging
            # Compose using staging compose file (env file is fixed to .env.frontend.staging)
            docker compose -f ~/apps/luisardito-shop-frontend/docker-compose.frontend.staging.yml down --remove-orphans || true
            docker compose -f ~/apps/luisardito-shop-frontend/docker-compose.frontend.staging.yml up -d
